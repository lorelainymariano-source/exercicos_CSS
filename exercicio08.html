<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float e Clear</title>
</head>
<body>

    <header>
        <div class="menu">
            MENU
        </div>
    </header>
    <style>
        .menu{
            background-color: rgb(4, 4, 249);
            height: 100px;
            width: 100%;
        }
        .esq{
            background-color: rgb(245, 245, 13);
            height: 400px;
            width: 350px;
            float: left;
            margin: 20px;
        }
        .meio{
            background-color: rgb(12, 114, 12);
            height: 400px;
            width: 350px;
            float: left;
            margin: 20px;
        }
        .dir{
            background-color: rgb(249, 42, 5);
            height: 400px;
            width: 350px;
            float: left;
            margin: 20px;
        }
        .roda{
            background-color: rgb(174, 16, 16);
            height: 60px;
            width: 100%;
        }
        .clear{
            clear: both;
        }
     </style>
         <main>
             <div class="esq">ESQUERDA</div>
             <div class="meio">MEIO</div>
             <div class="dir">DIREITA</div>

        <div class="clear"></div>
    </main>


    <footer>
        <div class="roda">
            RODAPÉ
        </div>

        </style>

             <div class="esq">ESQUERDA</div>

</body>
</html>
